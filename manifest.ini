name = "d4SpeechFilter"
summary = "Diablo IV Speech Filter"
description = "This addon aims to improve the experience using NVDA as the screen reader in Diablo IV. It cleans up the special symbols and removes the blank lines in equipment stats. There are also several speech replacements to make certain parts of the game less verbose."
